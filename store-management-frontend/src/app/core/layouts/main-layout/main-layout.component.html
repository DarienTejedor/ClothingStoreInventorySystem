<div class="layout-wrapper">
  
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">✨</span>
      <span>POS COSMÉTICOS</span>
    </div>
    
    <nav class="nav-menu">
      @for (option of menuOptions; track option.label) {
        @if (canSee(option.roles)) {
          <a [routerLink]="option.path" routerLinkActive="active" class="nav-item">
            
            <span class="nav-label">{{ option.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="sidebar-footer">
      <p class="role-badge">{{ userRole }}</p>
    </div>
  </aside>

  <div class="content-area">
    <header class="top-bar">
      <div class="user-info">
        <span class="welcome">Bienvenido,</span>
        <span class="user-name">Usuario</span>
      </div>
      <button class="btn-logout" (click)="logout()">
        Cerrar Sesión 🚪
      </button>
    </header>

    <main class="main-view">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
