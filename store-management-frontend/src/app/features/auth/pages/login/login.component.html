<div class="min-h-screen bg-[#F9F5F2] flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo / Marca -->
    <div class="text-center mb-8">
      <h1 class="font-serif text-4xl text-[#3D2E35] tracking-wide">
        Lumi
      </h1>
      <p class="text-sm text-[#A85A6E] mt-1 tracking-widest uppercase">
        Store Management
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-[#F4C0D1] px-8 py-10">

      <h2 class="text-xl font-medium text-[#3D2E35] mb-6">
        Iniciar sesión
      </h2>

      <!-- Error -->
      @if (errorMessage) {
        <div class="bg-[#FBEAF0] border border-[#F4C0D1] text-[#A85A6E] text-sm rounded-lg px-4 py-3 mb-5">
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onLogin()">

        <!-- Usuario -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-[#3D2E35] mb-1.5">
            Usuario
          </label>
          <input
            [(ngModel)]="loginData.loginUser"
            type="text"
            name="loginUser"
            placeholder="Tu usuario"
            class="w-full px-4 py-2.5 rounded-lg border border-[#E8D0D8] bg-[#F9F5F2] text-[#3D2E35] placeholder-[#C9A0AC] text-sm focus:outline-none focus:border-[#C97A8C] focus:ring-1 focus:ring-[#C97A8C] transition"
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-[#3D2E35] mb-1.5">
            Contraseña
          </label>
          <input
            [(ngModel)]="loginData.password"
            type="password"
            name="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-lg border border-[#E8D0D8] bg-[#F9F5F2] text-[#3D2E35] placeholder-[#C9A0AC] text-sm focus:outline-none focus:border-[#C97A8C] focus:ring-1 focus:ring-[#C97A8C] transition"
          />
        </div>

        <!-- Botón -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-2.5 rounded-full bg-[#C97A8C] hover:bg-[#A85A6E] text-white text-sm font-medium tracking-wide transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ isLoading ? 'Cargando...' : 'Entrar' }}
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-[#C9A0AC] mt-6">
      © 2026 Lumi · Todos los derechos reservados
    </p>

  </div>
</div>
