<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
  <div class="w-full max-w-lg p-6 bg-white rounded-xl shadow-xl max-h-[90vh] overflow-y-auto">
    
    <div class="flex items-center justify-between pb-4 border-b border-gray-200">
      <h3 class="text-xl font-bold text-gray-800">
        {{ isEditing ? 'Editar Usuario' : 'Nuevo Usuario' }}
      </h3>
      <button type="button" (click)="onClose()" class="text-gray-400 hover:text-gray-600 font-bold text-lg">&times;</button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSave()" class="mt-4 space-y-4">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700">Nombre Completo</label>
        <input type="text" formControlName="name" 
               class="w-full px-3 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Usuario (Login)</label>
        <input type="text" formControlName="loginUser" 
               class="w-full px-3 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Documento</label>
        <input type="text" formControlName="document" 
               class="w-full px-3 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">
          Contraseña {{ isEditing ? '(Opcional al editar)' : '' }}
        </label>
        <input type="password" formControlName="password" 
               class="w-full px-3 py-2 mt-1 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Rol</label>
        <select formControlName="roleId" 
                class="w-full px-3 py-2 mt-1 border bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Selecciona un Rol...</option>
          <option *ngFor="let role of rolesList" [value]="role.id">{{ role.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Tienda Asignada</label>
        <select formControlName="storeId" 
                class="w-full px-3 py-2 mt-1 border bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Selecciona una Tienda...</option>
          <option *ngFor="let store of storesList" [value]="store.id">{{ store.name }}</option>
        </select>
      </div>

      <div class="flex justify-end pt-4 space-x-3 border-t border-gray-200">
        <button type="button" (click)="onClose()" 
                class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">
          Cancelar
        </button>
        <button type="submit" [disabled]="userForm.invalid"
                class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50">
          {{ isEditing ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>

    </form>
  </div>
</div>
