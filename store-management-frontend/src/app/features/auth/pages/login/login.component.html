<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    @if (errorMessage) {
      <div style="color: var(--error-red); margin-bottom: 1rem; font-size: 0.9rem;">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Usuario</label>
        <input [(ngModel)]="loginData.loginUser" type="text" name="loginUser" placeholder="Tu usuario">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input [(ngModel)]="loginData.password" type="password" name="password" placeholder="••••••">
      </div>

      <button type="submit" class="btn-primary login-button" [disabled]="isLoading">
        {{ isLoading ? 'Cargando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
