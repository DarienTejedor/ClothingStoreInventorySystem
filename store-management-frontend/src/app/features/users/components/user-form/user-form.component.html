@if (isOpen) {
<div class="fixed inset-0 bg-brand-900/40 flex items-center justify-center z-50 px-4">

  <div class="bg-white rounded-2xl shadow-lg w-full max-w-lg border border-brand-100 max-h-[95vh] flex flex-col">

    <div class="flex items-center justify-between px-6 py-4 border-b border-brand-100 shrink-0">
      <h3 class="font-serif text-lg text-brand-900">
        {{ isEditing ? 'Editar Usuario' : 'Nuevo Usuario' }}
      </h3>
      <button
        type="button"
        (click)="onClose()"
        class="text-brand-600 hover:text-brand-400 text-xl leading-none transition-colors">
        ×
      </button>
    </div>

    <div class="px-6 py-5 overflow-y-auto space-y-8">

      <form [formGroup]="infoForm" (ngSubmit)="onSaveInfo()" class="space-y-4">
        <h4 class="text-xs font-medium text-brand-600 uppercase tracking-wider border-b border-brand-100 pb-1">
          Información Personal
        </h4>
        
        <div>
          <label class="block text-xs font-medium text-brand-900 mb-1.5">Nombre Completo</label>
          <input type="text" formControlName="name" placeholder="Ej: Darien Tejedor"
            class="w-full px-4 py-2.5 rounded-lg border border-brand-150 bg-cream text-sm text-brand-900 placeholder-brand-400 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 transition"/>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-brand-900 mb-1.5">Usuario (Login)</label>
            <input type="text" formControlName="loginUser" readonly
              class="w-full px-4 py-2.5 rounded-lg border border-brand-150 bg-cream text-sm text-brand-900 placeholder-brand-400 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 transition opacity-80 cursor-not-allowed"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-brand-900 mb-1.5">Documento</label>
            <input type="text" formControlName="document" placeholder="123456789"
              class="w-full px-4 py-2.5 rounded-lg border border-brand-150 bg-cream text-sm text-brand-900 placeholder-brand-400 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 transition"/>
          </div>
        </div>

        <div class="flex justify-end pt-1">
          <button type="submit" [disabled]="infoForm.invalid"
            class="px-5 py-2 rounded-full text-sm bg-brand-400 hover:bg-brand-600 text-white font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Guardar Información
          </button>
        </div>
      </form>

    

      <form [formGroup]="permissionsForm" (ngSubmit)="onSavePermissions()" class="space-y-4">
        <h4 class="text-xs font-medium text-brand-600 uppercase tracking-wider border-b border-brand-100 pb-1">
          Configuración y Accesos
        </h4>

        @if (isGeneralAdmin) {
        <div class="rounded-lg bg-brand-50 border border-brand-100 p-3 text-sm text-brand-700">
          Este usuario es el General Admin del sistema. Su rol y tienda no pueden modificarse.
        </div>
        }

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-brand-900 mb-1.5">Rol</label>
            <select formControlName="roleId"
              class="w-full px-4 pr-12 py-2.5 rounded-lg border border-brand-150 bg-cream text-sm text-brand-900 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 transition disabled:opacity-70 disabled:cursor-not-allowed">
              <option value="">Seleccionar rol...</option>
              <option *ngFor="let role of rolesList" [value]="role.id">{{ role.name }}</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-brand-900 mb-1.5">Tienda asignada</label>
            <select formControlName="storeId"
              class="w-full px-4 pr-12 py-2.5 rounded-lg border border-brand-150 bg-cream text-sm text-brand-900 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 transition disabled:opacity-70 disabled:cursor-not-allowed">
              <option value="">Seleccionar tienda...</option>
              <option *ngFor="let store of storesList" [value]="store.id">{{ store.name }}</option>
            </select>
          </div>
        </div>

        <div class="flex justify-end pt-1">
          <button type="submit" [disabled]="permissionsForm.invalid"
            class="px-5 py-2 rounded-full text-sm bg-brand-400 hover:bg-brand-600 text-white font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Guardar Permisos
          </button>
        </div>
      </form>

    </div>

    <div class="px-6 py-4 border-t border-brand-100 flex justify-end shrink-0 bg-brand-50/30 rounded-b-2xl">
      <button type="button" (click)="onClose()"
        class="px-5 py-2 rounded-full text-sm text-brand-600 border border-brand-100 hover:border-brand-400 hover:bg-brand-50 transition-colors">
        Cerrar Ventana
      </button>
    </div>

  </div>

</div>
}
